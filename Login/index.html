<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (works on most platforms) -->
    <meta property="og:title" content="Your Page Title" />
    <meta property="og:description" content="A short description of your page." />
    <meta property="og:image" content="https://luxelinteriors.infinityfree.me/preview-image.jpg" />
    <meta property="og:url" content="https://luxelinteriors.infinityfree.me" />
    <meta property="og:type" content="website" />
    <!-- Twitter/X specific (overrides OG tags on X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Page Title" />
    <meta name="twitter:description" content="A short description of your page." />
    <meta name="twitter:image" content="https://luxelinteriors.infinityfree.me/preview-image.jpg" />
    <title>Login to your account - Luxel Interiors</title>
    <!-- Favicon -->
    <link rel="icon" href="Images/favicon.png">
    <!-- CSS -->
    <link rel="stylesheet" href="login.css" />
    <!-- Flaticon Icons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css'>
</head>
<body>
    <!-- Login Section -->
    <section>
        <div class="logo">LUXEL INTERIORS</div>
        <!-- Login Form -->
        <form class="loginForm">
            <!-- Heading -->
            <p class="FormHeading">Login to your account</p>
            <!-- Google Login -->
            <div class="googleLogin">
                <!-- Google Login Button -->
                <a href="#" class="googleBtn"> 
                    <div>
                        <i class="fi fi-brands-google"></i> 
                        <p>Login with Google</p>
                    </div>
                </a>
            </div>
            <!-- Email Input -->
            <label for="username" class="inputLabel">
                Email: <br>
                <!-- Input field for email -->
                <input type="email" id="email" name="email" placeholder="Enter your email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" required >
            </label><br>
            <!-- Password Input -->
            <label for="password" class="inputLabel">
                Password: <br>
                <!-- Input field for password -->
                <input type="password" id="password" placeholder="Enter your password" required>
            </label><br>
            <!-- Forgot Password -->
            <div class="forgotPassword">
                <!-- Link to forgot password page -->
                <a href="../forgotPassword/">Forgot Password?</a>
            </div>
            <!-- Remember Me -->
            <div class="rememberMe">
                <!-- Checkbox for remember me option -->
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <p>Keep me logged in</p>
            </div>
            <!-- Submit Button -->
            <label class="inputLabel">
                <input type="submit" value="Submit" class="submitBtn">
            </label>
        </form>
        <!-- Sign Up Section -->
        <div class="signUp">Do you not have an account? <a href="../register/">Sign up</a></div>
    </section>
</body>
</html>
